services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: headphones
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d headphones"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  centrifugo:
    build:
      context: .
      dockerfile: Dockerfile.centrifugo
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  web:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: headphones
      DB_USER: app
      DB_PASSWORD: app
      ES_URL: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379/0
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: dev_hmac_secret_key_min_32_characters_long!
      CENTRIFUGO_API_KEY: dev_centrifugo_api_key_________________
      CENTRIFUGO_PUBLISH_URL: http://centrifugo:8000/api/publish
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      SOCIAL_AUTH_GOOGLE_OAUTH2_KEY: ${SOCIAL_AUTH_GOOGLE_OAUTH2_KEY:-}
      SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET: ${SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/web/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.docker.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - ./public:/usr/share/nginx/public:ro
    ports:
      - "8080:8080"
    depends_on:
      web:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/web/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
  es_data:
