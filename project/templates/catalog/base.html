<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Каталог наушников{% endblock %}</title>
</head>
<body>
    <nav>
        <a href="{% url 'web:home' %}">Главная</a> |
        <a href="{% url 'web:feed' %}">Лента</a> |
        <a href="{% url 'web:search' %}">Поиск</a> |
        {% if user.is_authenticated %}
            <a href="{% url 'web:profile' %}">Профиль</a> |
            <a href="{% url 'web:favorites' %}">Избранное</a> |
            <span>{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline">
                {% csrf_token %}
                <button type="submit">Выйти</button>
            </form>
        {% else %}
            <a href="{% url 'web:login' %}">Войти</a>
        {% endif %}
    </nav>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
